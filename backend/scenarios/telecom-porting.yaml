scenario:
  key: telecom_porting
  name: 携号转网风险预警
  app_title: 携号转网场景语义预警系统
  header_title: 携号转网场景语义预警系统
  dashboard_subtitle: 围绕用户、携转资格、合约、账务、网络使用、客服交互和维系动作监控携转风险
  reference_date: 2026-03-20
  primary_dataset: user_info
  primary_entity_label: 用户
  primary_entity_plural_label: 用户
  primary_id_field: user_id
  primary_label_field: device_number
  primary_node_type: User
  search_fields:
    - user_id
    - device_number
  risk_terms:
    - 风险
    - risk
    - 携转
    - 携号转网
    - 转网
    - 告警
  sample_query: |
    PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    PREFIX telecom: <http://example.com/telecom#>
    SELECT ?userId ?deviceNumber ?riskLevel ?areaId
    WHERE {
      ?user a telecom:User ;
            telecom:userId ?userId ;
            telecom:deviceNumber ?deviceNumber ;
            telecom:inferredRiskLevel ?riskLevel .
      OPTIONAL { ?user telecom:areaId ?areaId }
    }
    ORDER BY DESC(?riskLevel) ?userId
    LIMIT 10
  question_suggestions:
    - 哪些用户属于高风险携转预警？
    - 哪些规则被命中最多？
    - 最近有哪些携转资格查询或投诉记录？
  interaction_datasets:
    - porting_query
    - voice_usage
    - customer_service
    - retention_action
  graph_datasets:
    - porting_query
    - contract_info
    - om_datum
    - charge_info
    - arrear_info
    - customer_service
    - retention_action
  source_cards:
    - key: user_info
      dataset: user_info
      label: 用户信息
      file: dwa_v_d_cus_cb_user_info.csv
      icon: user
      tone: crm
      count_mode: primary
    - key: porting_query
      dataset: porting_query
      label: 携转资格查询
      file: dwd_d_cus_np_turn_query_user.csv
      icon: event
      tone: interaction
      count_mode: records
    - key: contract_info
      dataset: contract_info
      label: 业务合约
      file: dwa_v_d_cus_cb_act_info.csv
      icon: file
      tone: commercial
      count_mode: records
    - key: om_datum
      dataset: om_datum
      label: 融合绑定
      file: DWA_V_D_CUS_CB_OM_DATUM.csv
      icon: file
      tone: commercial
      count_mode: records
    - key: charge_info
      dataset: charge_info
      label: 账务信息
      file: dwa_v_m_cus_cb_sing_charge.csv
      icon: money
      tone: commercial
      count_mode: records
    - key: voice_usage
      dataset: voice_usage
      label: 网络使用
      file: dwd_d_use_cb_f_voice.csv
      icon: data
      tone: usage
      count_mode: records
    - key: customer_service
      dataset: customer_service
      label: 客服交互
      file: dwd_d_evt_kf_order_main.csv
      icon: interaction
      tone: interaction
      count_mode: records
    - key: retention_action
      dataset: retention_action
      label: 维系动作
      file: dwd_d_cus_qk_turn_maintain.csv
      icon: alert
      tone: usage
      count_mode: records
  ontology_files:
    - name: doim-core.ttl
      desc: DOIM 核心本体，定义 Entity / Relation / Identifier 等基础语义。
      tone: ttl
    - name: telecom-porting.ttl
      desc: 携号转网领域本体，定义用户、携转资格、合约、账务、网络使用、客服交互和维系动作。
      tone: ttl
    - name: porting-risk.yaml
      desc: 风险规则定义，驱动高、中、低风险预警推理。
      tone: rules
  rule_cards:
    - label: 高风险携转预警
      desc: 近7天查询携转资格、无合约无融合绑定无欠费、存在竞对通话、投诉频发且维系失败。
      tone: high
    - label: 中风险携转预警
      desc: 近30天出现携转查询、无合约无融合绑定无欠费，具备竞对通话和投诉信号，维系成功但仍需持续关注。
      tone: medium
    - label: 低风险携转预警
      desc: 近30天无查询、无竞对通话、近60天无投诉，且维持无合约无融合绑定无欠费状态。
      tone: low
  architecture:
    - title: 数据接入层
      subtitle: 多模型 CSV 输入
      items:
        - 用户信息
        - 携转资格查询
        - 业务合约 / 融合绑定 / 账务
        - 网络使用 / 客服交互 / 维系动作
    - title: 语义层
      subtitle: DOIM + 携转场景本体
      items:
        - User / PortingQuery / BusinessContract
        - BillingRecord / NetworkUsage / CustomerServiceInteraction
        - RetentionAction / RiskFactor / RiskAlert
    - title: 推理层
      subtitle: RDFLib + 规则聚合
      items:
        - 配置化实例物化
        - 用户级事实聚合
        - OWL-RL + 决策表推理
    - title: 应用层
      subtitle: FastAPI + React
      items:
        - 风险告警
        - 图谱探索
        - 规则命中解释
        - SPARQL 问答
  mapping_examples:
    - label: 用户
      code: ':user/U1001 a telecom:User ; telecom:userId "U1001" ; telecom:deviceNumber "13900000001" .'
    - label: 携转资格
      code: ':porting-query/U1001/2026-03-18T09%3A30%3A00 a telecom:PortingQuery ; telecom:queryTime "2026-03-18T09:30:00" .'
    - label: 关系
      code: ':user/U1001 telecom:hasPortingQuery :porting-query/U1001/2026-03-18T09%3A30%3A00 .'

datasets:
  user_info:
    file: dwa_v_d_cus_cb_user_info.csv
    source_system: CRM
    id_fields:
      - user_id
    join_keys:
      user_id: user_id
      device_number: device_number
    label_field: device_number
    node_type: User
    entity_label: 用户
  porting_query:
    file: dwd_d_cus_np_turn_query_user.csv
    source_system: PORTING
    id_fields:
      - user_id
      - query_time
    join_keys:
      user_id: user_id
      device_number: device_number
    label_template: "{device_number} 携转查询"
    node_type: PortingQuery
    entity_label: 携转资格
  contract_info:
    file: dwa_v_d_cus_cb_act_info.csv
    source_system: CONTRACT
    id_fields:
      - user_id
      - activity_type
      - start_date
    join_keys:
      user_id: user_id
      device_number: device_number
    label_template: "{activity_type} 合约"
    node_type: Contract
    entity_label: 业务合约
  om_datum:
    file: DWA_V_D_CUS_CB_OM_DATUM.csv
    source_system: OM
    id_fields:
      - user_id
      - device_number
      - start_date
    join_keys:
      user_id: user_id
      device_number: device_number
    label_template: "{device_number} 融合绑定"
    node_type: Contract
    entity_label: 融合绑定
  charge_info:
    file: dwa_v_m_cus_cb_sing_charge.csv
    source_system: BILLING
    id_fields:
      - user_id
    join_keys:
      user_id: user_id
      device_number: device_number
    label_template: "{device_number} 出账信息"
    node_type: Billing
    entity_label: 账务信息
  arrear_info:
    file: dwd_m_mrt_al_chl_owe.csv
    source_system: BILLING
    id_fields:
      - subs_id
      - latest_date
    join_keys:
      user_id: subs_id
    label_template: "{subs_id} 欠费信息"
    node_type: Billing
    entity_label: 欠费信息
  voice_usage:
    file: dwd_d_use_cb_f_voice.csv
    source_system: NETWORK
    id_fields:
      - user_id
      - start_date
      - oppose_dealer_type
    join_keys:
      user_id: user_id
      device_number: device_number
    label_template: "{device_number} 网络使用"
    node_type: NetworkUsage
    entity_label: 网络使用
  customer_service:
    file: dwd_d_evt_kf_order_main.csv
    source_system: SERVICE
    id_fields:
      - sheet_id
    join_keys:
      device_number: device_number
    label_template: "{device_number} 客服交互"
    node_type: CustomerService
    entity_label: 客服交互
  retention_action:
    file: dwd_d_cus_qk_turn_maintain.csv
    source_system: RETENTION
    id_fields:
      - device_number
      - call_conn_time
    join_keys:
      device_number: device_number
    label_template: "{device_number} 维系动作"
    node_type: RetentionAction
    entity_label: 维系动作

relations:
  - source_dataset: user_info
    target_dataset: porting_query
    source_join_key: user_id
    target_join_key: user_id
    predicate: telecom:hasPortingQuery
    label: 拥有资格
    source_system: PORTING
  - source_dataset: user_info
    target_dataset: contract_info
    source_join_key: user_id
    target_join_key: user_id
    predicate: telecom:hasBusinessContract
    label: 签订合约
    source_system: CONTRACT
  - source_dataset: user_info
    target_dataset: om_datum
    source_join_key: user_id
    target_join_key: user_id
    predicate: telecom:hasBusinessContract
    label: 融合绑定
    source_system: OM
  - source_dataset: user_info
    target_dataset: charge_info
    source_join_key: user_id
    target_join_key: user_id
    predicate: telecom:hasBillingRecord
    label: 产生账务
    source_system: BILLING
  - source_dataset: user_info
    target_dataset: arrear_info
    source_join_key: user_id
    target_join_key: user_id
    predicate: telecom:hasBillingRecord
    label: 关联欠费
    source_system: BILLING
  - source_dataset: user_info
    target_dataset: voice_usage
    source_join_key: user_id
    target_join_key: user_id
    predicate: telecom:hasNetworkUsage
    label: 存在使用行为
    source_system: NETWORK
  - source_dataset: user_info
    target_dataset: customer_service
    source_join_key: device_number
    target_join_key: device_number
    predicate: telecom:hasCustomerServiceInteraction
    label: 发起客服交互
    source_system: SERVICE
  - source_dataset: user_info
    target_dataset: retention_action
    source_join_key: device_number
    target_join_key: device_number
    predicate: telecom:hasRetentionAction
    label: 接受维系动作
    source_system: RETENTION
  - source_dataset: contract_info
    target_dataset: porting_query
    source_join_key: user_id
    target_join_key: user_id
    predicate: telecom:restrictsPortingQuery
    label: 受限于合约
    source_system: CONTRACT
  - source_dataset: arrear_info
    target_dataset: porting_query
    source_join_key: user_id
    target_join_key: user_id
    predicate: telecom:associatesBillingStatus
    label: 关联欠费状态
    source_system: BILLING
  - source_dataset: voice_usage
    target_dataset: retention_action
    source_join_key: device_number
    target_join_key: device_number
    predicate: telecom:triggersRetentionAction
    label: 基于使用行为
    source_system: NETWORK
  - source_dataset: customer_service
    target_dataset: retention_action
    source_join_key: device_number
    target_join_key: device_number
    predicate: telecom:influencesRetentionAction
    label: 客服反馈影响
    source_system: SERVICE

facts:
  - key: innetMonths
    label: 在网时长(月)
    source_dataset: user_info
    aggregate: first
    field: innet_months
    cast: int
    default: 0
  - key: hasActiveContract
    label: 是否存在有效合约
    source_dataset: contract_info
    aggregate: exists
    default: false
    where:
      all:
        - field: end_date
          op: date_on_or_after
          value: today
  - key: hasArrears
    label: 是否存在欠费
    source_dataset: arrear_info
    aggregate: exists
    default: false
    where:
      all:
        - field: arrear_fee
          op: ">"
          value: 0
  - key: hasFusionBinding
    label: 是否存在融合绑定
    source_dataset: om_datum
    aggregate: exists
    default: false
    where:
      all:
        - field: comp_type
          op: not_empty
  - key: recentQueryDays
    label: 最近查询距今天数
    source_dataset: porting_query
    aggregate: min_days_since
    field: query_time
    cast: int
    default: 9999
  - key: hasRecentQuery7d
    label: 近7天是否查询携转资格
    source_dataset: porting_query
    aggregate: exists
    default: false
    where:
      all:
        - field: query_time
          op: within_days
          value: 7
  - key: hasRecentQuery30d
    label: 近30天是否查询携转资格
    source_dataset: porting_query
    aggregate: exists
    default: false
    where:
      all:
        - field: query_time
          op: within_days
          value: 30
  - key: queryAllowed
    label: 是否允许携出
    source_dataset: porting_query
    aggregate: latest
    field: out_tag
    order_by: query_time
    default: "0"
  - key: latestQueryChannel
    label: 最近查询渠道
    source_dataset: porting_query
    aggregate: latest
    field: query_channel
    order_by: query_time
    default: ""
  - key: competitorCallCount7d
    label: 近7天竞对通话次数
    source_dataset: voice_usage
    aggregate: count
    cast: int
    default: 0
    where:
      all:
        - field: oppose_dealer_type
          op: "!="
          value: "02"
        - field: start_date
          op: within_days
          value: 7
  - key: competitorCallCount30d
    label: 近30天竞对通话次数
    source_dataset: voice_usage
    aggregate: count
    cast: int
    default: 0
    where:
      all:
        - field: oppose_dealer_type
          op: "!="
          value: "02"
        - field: start_date
          op: within_days
          value: 30
  - key: complaintCount30d
    label: 近30天投诉次数
    source_dataset: customer_service
    aggregate: count
    cast: int
    default: 0
    where:
      all:
        - field: accept_time
          op: within_days
          value: 30
  - key: complaintCount60d
    label: 近60天投诉次数
    source_dataset: customer_service
    aggregate: count
    cast: int
    default: 0
    where:
      all:
        - field: accept_time
          op: within_days
          value: 60
  - key: latestMaintainSuccess
    label: 最近维系是否成功
    source_dataset: retention_action
    aggregate: latest
    field: is_success_maintain
    order_by: call_conn_time
    default: ""
  - key: latestMaintainOutcome
    label: 最近外呼结果
    source_dataset: retention_action
    aggregate: latest
    field: call_result
    order_by: call_conn_time
    default: ""
  - key: totalFee
    label: 最近出账费用
    source_dataset: charge_info
    aggregate: first
    field: total_fee
    cast: decimal
    default: 0

alert_fields:
  summary:
    - label: 手机号码
      source: user_info
      field: device_number
    - label: 地市编码
      source: user_info
      field: area_id
    - label: 用户类型
      source: user_info
      field: user_type
  detail:
    - label: 用户标识
      source: user_info
      field: user_id
    - label: 手机号码
      source: user_info
      field: device_number
    - label: 地市编码
      source: user_info
      field: area_id
    - label: 用户状态
      source: user_info
      field: user_status
    - label: 在网时长(月)
      fact: innetMonths
    - label: 最近查询渠道
      fact: latestQueryChannel
    - label: 最近维系结果
      fact: latestMaintainOutcome
    - label: 最近出账费用
      fact: totalFee
  highlights:
    - label: 最近查询距今天数
      fact: recentQueryDays
    - label: 近7天竞对通话
      fact: competitorCallCount7d
    - label: 近30天投诉
      fact: complaintCount30d
    - label: 有效合约
      fact: hasActiveContract
    - label: 融合绑定
      fact: hasFusionBinding

alert_sort:
  - fact: hasRecentQuery7d
    order: desc
  - fact: hasRecentQuery30d
    order: desc
  - fact: hasFusionBinding
    order: asc
  - fact: competitorCallCount7d
    order: desc
  - fact: complaintCount30d
    order: desc
