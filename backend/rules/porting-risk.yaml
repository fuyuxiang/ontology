risk_actions:
  HIGH: 携转风险等级=高，触发紧急维系流程（例如：专属客服对接）
  MEDIUM: 携转风险等级=中，触发常规维系流程（例如：72小时内外呼+优惠推荐）
  LOW: 携转风险等级=低，无需主动维系，持续监控即可

factor_rules:
  - id: no_active_contract
    rule_label: 无有效合约
    factor:
      code: no_active_contract
      label: 无有效合约
    when:
      all:
        - field: hasActiveContract
          op: "=="
          value: false

  - id: no_fusion_binding
    rule_label: 无融合绑定
    factor:
      code: no_fusion_binding
      label: 无融合绑定
    when:
      all:
        - field: hasFusionBinding
          op: "=="
          value: false

  - id: no_arrears
    rule_label: 无欠费
    factor:
      code: no_arrears
      label: 无欠费
    when:
      all:
        - field: hasArrears
          op: "=="
          value: false

  - id: recent_query_7d
    rule_label: 近7天携转资格查询
    factor:
      code: recent_query_7d
      label: 近7天携转资格查询
    when:
      all:
        - field: hasRecentQuery7d
          op: "=="
          value: true
        - field: queryAllowed
          op: "=="
          value: "1"

  - id: recent_query_30d
    rule_label: 近30天携转资格查询
    factor:
      code: recent_query_30d
      label: 近30天携转资格查询
    when:
      all:
        - field: hasRecentQuery30d
          op: "=="
          value: true
        - field: queryAllowed
          op: "=="
          value: "1"

  - id: competitor_call
    rule_label: 存在竞对通话
    factor:
      code: competitor_call
      label: 存在竞对通话
    when:
      any:
        - field: competitorCallCount7d
          op: ">"
          value: 0
        - field: competitorCallCount30d
          op: ">"
          value: 0

  - id: complaint_30d
    rule_label: 近30天投诉偏高
    factor:
      code: complaint_30d
      label: 近30天投诉偏高
    when:
      all:
        - field: complaintCount30d
          op: ">="
          value: 2

  - id: complaint_60d
    rule_label: 近60天存在投诉
    factor:
      code: complaint_60d
      label: 近60天存在投诉
    when:
      all:
        - field: complaintCount60d
          op: ">="
          value: 1

  - id: retention_failed
    rule_label: 维系失败
    factor:
      code: retention_failed
      label: 维系失败
    when:
      all:
        - field: latestMaintainSuccess
          op: "=="
          value: "0"

  - id: retention_success
    rule_label: 维系成功
    factor:
      code: retention_success
      label: 维系成功
    when:
      all:
        - field: latestMaintainSuccess
          op: "=="
          value: "1"

  - id: short_tenure
    rule_label: 短网龄
    factor:
      code: short_tenure
      label: 在网时长不足1年
    when:
      all:
        - field: innetMonths
          op: "<"
          value: 12

decision_rules:
  - id: high_porting_risk
    priority: 100
    rule_label: 高风险携转预警
    when:
      all:
        - field: hasActiveContract
          op: "=="
          value: false
        - field: hasFusionBinding
          op: "=="
          value: false
        - field: hasArrears
          op: "=="
          value: false
        - field: hasRecentQuery7d
          op: "=="
          value: true
        - field: queryAllowed
          op: "=="
          value: "1"
        - field: competitorCallCount7d
          op: ">"
          value: 0
        - field: complaintCount30d
          op: ">="
          value: 2
        - field: latestMaintainSuccess
          op: "=="
          value: "0"
        - field: innetMonths
          op: "<"
          value: 12
    then:
      risk_level: HIGH

  - id: medium_porting_risk
    priority: 50
    rule_label: 中风险携转预警
    when:
      all:
        - field: hasActiveContract
          op: "=="
          value: false
        - field: hasFusionBinding
          op: "=="
          value: false
        - field: hasArrears
          op: "=="
          value: false
        - field: hasRecentQuery30d
          op: "=="
          value: true
        - field: queryAllowed
          op: "=="
          value: "1"
        - field: competitorCallCount30d
          op: ">"
          value: 0
        - field: complaintCount60d
          op: ">="
          value: 1
        - field: latestMaintainSuccess
          op: "=="
          value: "1"
        - field: innetMonths
          op: "<"
          value: 12
    then:
      risk_level: MEDIUM

  - id: low_porting_risk
    priority: 10
    rule_label: 低风险携转预警
    when:
      all:
        - field: hasActiveContract
          op: "=="
          value: false
        - field: hasFusionBinding
          op: "=="
          value: false
        - field: hasArrears
          op: "=="
          value: false
        - field: hasRecentQuery30d
          op: "=="
          value: false
        - field: competitorCallCount30d
          op: "=="
          value: 0
        - field: complaintCount60d
          op: "=="
          value: 0
    then:
      risk_level: LOW

  - id: low_risk_default
    priority: 0
    rule_label: 低风险默认规则
    when:
      all: []
    then:
      risk_level: LOW
